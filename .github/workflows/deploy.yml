name: Deploy to OpenShift

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Récupérer le code
      - uses: actions/checkout@v4

      # Installer l'outil oc
      - name: Install OpenShift CLI (oc)
        run: |
          curl -LO "https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz"
          tar xzf openshift-client-linux.tar.gz
          sudo mv oc /usr/local/bin/
          oc version

      # Vérifier que les secrets sont bien définis
      - name: Check OpenShift secrets
        run: |
          if [ -z "${{ secrets.OPENSHIFT_SERVER }}" ] || [ -z "${{ secrets.OPENSHIFT_TOKEN }}" ]; then
            echo "Error: OPENSHIFT_SERVER or OPENSHIFT_TOKEN is empty!"
            exit 1
          fi

      # Login à OpenShift (version sûre)
      - name: Login to OpenShift
        run: |
          oc login --token="${{ secrets.OPENSHIFT_TOKEN }}" --server="${{ secrets.OPENSHIFT_SERVER }}"
          oc whoami

      # Lancer la build
      - name: Start OpenShift build
        run: oc start-build webapp -n boubacar605-dev

      # Attendre la fin de la build
      - name: Wait for build to complete
        run: oc wait --for=condition=complete build --all -n boubacar605-dev --timeout=300s

      # Déployer la dernière version
      - name: Rollout latest deployment
        run: oc rollout latest dc/webapp -n boubacar605-dev
